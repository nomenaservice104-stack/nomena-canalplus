<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CANAL+ - Saisie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#eef2f7;color:#e9eef5;line-height:1.5;min-height:100vh}
    .header{background:#16202d;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.12)}
    .header h1{font-size:18px;color:#eaf1fb;font-weight:700}
    .nav-btn{background:#2f6fed;color:#fff;border:none;padding:7px 13px;border-radius:6px;cursor:pointer;font-weight:600;font-size:12px;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
    .nav-btn:hover{opacity:.9}
    .nav-links{display:flex;gap:6px}
    .container{max-width:620px;margin:16px auto;padding:0 12px}
    .card{background:#16202d;border-radius:8px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.12);color:#eef4fb}
    .card h2{font-size:15px;margin-bottom:12px;color:#f2f6fb;font-weight:600}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
    .form-group{margin-bottom:0}
    .form-group label{display:block;font-size:11px;color:#b8c4d4;margin-bottom:3px;font-weight:500}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:6px 8px;border:1px solid #415063;border-radius:5px;background:#1a2431;color:#eef4fb;font-size:12px;font-family:inherit}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#2f6fed}
    .form-group textarea{resize:vertical;min-height:60px}
    .full-width{grid-column:1/-1}
    .contact-group{max-width:190px}
    .checkbox-group{display:flex;align-items:center;gap:8px;padding-top:18px}
    .checkbox-group label{margin:0;font-size:12px;color:#b8c4d4}
    .checkbox-group input{width:auto;accent-color:#2f6fed}
    .btn-group{display:flex;gap:7px;margin-top:12px}
    button{border:none;padding:7px 13px;border-radius:5px;cursor:pointer;font-weight:600;font-size:12px}
    .btn-primary{background:#2f6fed;color:#fff;flex:1}
    .btn-secondary{background:#415063;color:#eef4fb;flex:1}
    button:hover{opacity:.92}
    .hidden{display:none !important}
    .info-box{background:#1a2431;border-radius:5px;padding:8px;margin-top:10px;font-size:10px;color:#94a3b8}
    .info-box strong{color:#b8c4d4}
    .commission-display{background:#1a2431;border-radius:5px;padding:8px;margin-top:8px;font-size:11px}
    .commission-display div{margin:3px 0}
    .commission-toi{color:#22c55e;font-weight:700}
    .commission-source{color:#38bdf8;font-weight:600}
    .commission-tech{color:#f59e0b;font-weight:600}
    .photo-preview{display:grid;grid-template-columns:repeat(auto-fit,minmax(60px,1fr));gap:5px;margin-top:7px}
    .photo-preview img{width:100%;height:60px;object-fit:cover;border-radius:4px}

    @media print {
      @page { size: 80mm auto; margin: 0; }
      html, body { margin: 0; padding: 0; width: 100%; }
      body * { visibility: hidden !important; }
      .print-window, .print-window * { visibility: visible !important; }
      .print-window {
        position: fixed;
        left: 0;
        top: 0;
        width: 72mm;
        padding: 2mm 3mm;
        font-family: Arial, sans-serif;
        color: #000;
        font-size: 11px;
      }
      .ticket { width: 100%; }
      .center { text-align: center; }
      .title { font-size: 14px; font-weight: 700; }
      .subtitle { font-size: 12px; font-weight: 700; margin-top: 1px; }
      .phone { font-size: 10px; margin-top: 1px; }
      .small { font-size: 10px; }
      .hr { border-top: 1px dashed #000; margin: 4px 0; }
      .row {
        display: flex;
        justify-content: space-between;
        gap: 4px;
        margin: 1px 0;
        align-items: flex-start;
      }
      .label {
        font-weight: 700;
        min-width: 24mm;
        flex: 0 0 24mm;
      }
      .value {
        flex: 1;
        text-align: right;
        word-break: break-word;
        overflow-wrap: anywhere;
      }
    }
  </style>
</head>
<body>
  <div class="header no-print">
    <h1>📺 CANAL+ - Saisie</h1>
    <div class="nav-links">
      <a href="acceuil.html" class="nav-btn">🏠 Acceuil</a>
      <a href="commissions.html" class="nav-btn">💰 Commissions</a>
      <a href="stock.html" class="nav-btn">📦 Stock</a>
      <a href="liste.html" class="nav-btn">📋 Liste</a>
    </div>
  </div>

  <div class="container no-print">
    <div class="card">
      <h2 id="formTitle">➕ Nouvelle opération</h2>
      
      <form id="opForm">
        <div class="form-grid">
          <div class="form-group">
            <label>Type *</label>
            <select id="type" required onchange="renderVisibility();renderCalc()">
              <option value="vente">Vente</option>
              <option value="reabo">Réabonnement</option>
            </select>
          </div>
          
          <div class="form-group">
            <label>Statut</label>
            <select id="statut">
              <option value="OK">OK</option>
              <option value="En attente">En attente</option>
              <option value="Annulé">Annulé</option>
            </select>
          </div>
          
          <div class="form-group">
            <label>Date *</label>
            <input type="date" id="date" required>
          </div>
          
          <div class="form-group">
            <label>Heure *</label>
            <input type="time" id="heure" required>
          </div>
          
          <div class="form-group">
            <label>Nom *</label>
            <input type="text" id="nom" placeholder="Nom" required>
          </div>
          
          <div class="form-group">
            <label>Prénom</label>
            <input type="text" id="prenom" placeholder="Prénom">
          </div>
          
          <div class="form-group contact-group">
            <label>Contact</label>
            <input type="text" id="contact" placeholder="15 chiffres" maxlength="15" inputmode="numeric">
          </div>
          
          <div class="form-group">
            <label>Source</label>
            <input type="text" id="source" placeholder="Ex: Facebook, Voisin...">
          </div>
          
          <div class="form-group">
            <label>Technicien</label>
            <input type="text" id="technicien" placeholder="Nom du tech">
          </div>
          
          <div class="form-group">
            <label>Adresse</label>
            <input type="text" id="adresse" placeholder="Adresse">
          </div>
          
          <div class="form-group checkbox-group">
            <input type="checkbox" id="spOk">
            <label for="spOk">SP ok</label>
          </div>
          
          <div class="form-group" id="carteGroup">
            <label>N° Carte *</label>
            <input type="text" id="numCarte" placeholder="Numéro carte">
          </div>
          
          <div class="form-group" id="decodeurGroup">
            <label>N° Décodeur</label>
            <input type="text" id="numDecodeur" placeholder="Numéro décodeur">
          </div>
          
          <div class="form-group" id="bouquetGroup">
            <label>Bouquet *</label>
            <select id="bouquet" required>
              <option value="">Choisir bouquet...</option>
              <option value="Access">Access</option>
              <option value="Evasion">Evasion</option>
              <option value="Access+">Access+</option>
              <option value="Tout Canal">Tout Canal</option>
              <option value="Non précisé">Non précisé</option>
            </select>
          </div>
          
          <div class="form-group" id="montantGroup">
            <label>Montant (Ar) *</label>
            <input type="number" id="montant" placeholder="0" min="0" required>
          </div>

          <div class="form-group full-width hidden" id="photosGroup">
            <label>Photos vente</label>
            <div class="form-grid">
              <div class="form-group">
                <label>Photo décodeur</label>
                <input type="file" id="photoDecodeur" accept="image/*">
              </div>
              <div class="form-group">
                <label>Photo carte</label>
                <input type="file" id="photoCarte" accept="image/*">
              </div>
              <div class="form-group">
                <label>Photo signal</label>
                <input type="file" id="photoSignal" accept="image/*">
              </div>
              <div class="form-group">
                <label>Photo parabole</label>
                <input type="file" id="photoParabole" accept="image/*">
              </div>
            </div>
          </div>
        </div>

        <div class="commission-display">
          <div><strong>ℹ️ Commissions :</strong></div>
          <div class="commission-toi">👉 Ta commission : <span id="commToi">0</span> Ar</div>
          <div class="commission-source">📢 Source : <span id="commSource">0</span> Ar</div>
          <div class="commission-tech">🔧 Tech : <span id="commTech">0</span> Ar</div>
        </div>

        <div class="info-box">
          <strong>Vente :</strong> 25k fixe (Source:5k, Tech:10k, Toi:10k)<br>
          <strong>Réabo :</strong> 6% (sans source) ou 3%+3% (avec source)
        </div>

        <div class="btn-group">
          <button type="button" class="btn-secondary" onclick="resetForm()">🔄 Effacer</button>
          <button type="button" class="btn-secondary" onclick="printReceipt()">🖨️ Imprimer reçu</button>
          <button type="submit" class="btn-primary">💾 Enregistrer</button>
        </div>
      </form>
    </div>
  </div>

  <div id="printArea" class="print-window" style="display:none;"></div>

  <script>
    const STORAGE_KEY = 'canalplus_operations';
    let editId = null;

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2);
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        return [];
      }
    }

    function saveData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function setDefaultDateTime() {
      const now = new Date();
      const dateInput = document.getElementById('date');
      const timeInput = document.getElementById('heure');
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      dateInput.value = `${year}-${month}-${day}`;
      timeInput.value = `${hours}:${minutes}`;
    }

    function renderVisibility() {
      const type = document.getElementById('type').value;
      const carteGroup = document.getElementById('carteGroup');
      const decodeurGroup = document.getElementById('decodeurGroup');
      const bouquetGroup = document.getElementById('bouquetGroup');
      const montantGroup = document.getElementById('montantGroup');
      const photosGroup = document.getElementById('photosGroup');
      const bouquet = document.getElementById('bouquet');
      const montant = document.getElementById('montant');

      if (type === 'vente') {
        carteGroup.classList.remove('hidden');
        decodeurGroup.classList.remove('hidden');
        bouquetGroup.classList.add('hidden');
        montantGroup.classList.add('hidden');
        photosGroup.classList.remove('hidden');
        bouquet.required = false;
        montant.required = false;
      } else {
        carteGroup.classList.remove('hidden');
        decodeurGroup.classList.add('hidden');
        bouquetGroup.classList.remove('hidden');
        montantGroup.classList.remove('hidden');
        photosGroup.classList.add('hidden');
        bouquet.required = true;
        montant.required = true;
      }
    }

    function calcSaleCommission(source, technicien) {
      const base = 25000;
      const commissionSource = source ? 5000 : 0;
      const commissionTech = technicien ? 10000 : 0;
      const commissionToi = base - commissionSource - commissionTech;
      return { commissionToi, commissionSource, commissionTech, montant: base };
    }

    function calcReaboCommission(source, montant) {
      const base = Number(montant) || 0;
      if (source) {
        const commissionSource = base * 0.03;
        const commissionToi = base * 0.03;
        return { commissionToi, commissionSource, commissionTech: 0, montant: base };
      } else {
        const commissionToi = base * 0.06;
        return { commissionToi, commissionSource: 0, commissionTech: 0, montant: base };
      }
    }

    function renderCalc() {
      const type = document.getElementById('type').value;
      const source = document.getElementById('source').value.trim();
      const technicien = document.getElementById('technicien').value.trim();
      const montantSaisi = document.getElementById('montant').value;

      let commissions;
      if (type === 'vente') {
        commissions = calcSaleCommission(source, technicien);
        document.getElementById('montant').value = commissions.montant;
      } else {
        commissions = calcReaboCommission(source, montantSaisi);
      }

      document.getElementById('commToi').textContent = Math.round(commissions.commissionToi).toLocaleString('fr-FR');
      document.getElementById('commSource').textContent = Math.round(commissions.commissionSource).toLocaleString('fr-FR');
      document.getElementById('commTech').textContent = Math.round(commissions.commissionTech).toLocaleString('fr-FR');
    }

    function resetForm() {
      document.getElementById('opForm').reset();
      editId = null;
      setDefaultDateTime();
      document.getElementById('formTitle').textContent = '➕ Nouvelle opération';
      renderVisibility();
      renderCalc();
    }

    function readFileAsDataURL(file) {
      return new Promise((resolve, reject) => {
        if (!file) return resolve('');
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result || '');
        reader.onerror = () => reject(new Error('Erreur lecture fichier'));
        reader.readAsDataURL(file);
      });
    }

    async function getPhotoValues() {
      const files = {
        photoDecodeur: document.getElementById('photoDecodeur').files[0],
        photoCarte: document.getElementById('photoCarte').files[0],
        photoSignal: document.getElementById('photoSignal').files[0],
        photoParabole: document.getElementById('photoParabole').files[0]
      };
      const entries = await Promise.all(Object.entries(files).map(async ([key, file]) => [key, await readFileAsDataURL(file)]));
      return Object.fromEntries(entries);
    }

    function loadEditIfAny() {
      const params = new URLSearchParams(window.location.search);
      const editIdParam = params.get('edit');
      if (!editIdParam) return;

      const data = loadData();
      const item = data.find(x => x.id === editIdParam);
      if (!item) return;

      editId = item.id;
      document.getElementById('formTitle').textContent = '✏️ Modifier opération';

      document.getElementById('type').value = item.type || 'vente';
      document.getElementById('statut').value = item.statut || 'OK';
      document.getElementById('date').value = item.date || '';
      document.getElementById('heure').value = item.heure || '';
      document.getElementById('nom').value = item.nom || '';
      document.getElementById('prenom').value = item.prenom || '';
      document.getElementById('contact').value = item.contact || '';
      document.getElementById('source').value = item.source || '';
      document.getElementById('technicien').value = item.technicien || '';
      document.getElementById('adresse').value = item.adresse || '';
      document.getElementById('spOk').checked = !!item.spOk;
      document.getElementById('numCarte').value = item.numCarte || '';
      document.getElementById('numDecodeur').value = item.numDecodeur || '';
      document.getElementById('bouquet').value = item.bouquet || '';
      document.getElementById('montant').value = item.montant || '';

      renderVisibility();
      renderCalc();
    }

    function printReceipt() {
      const type = document.getElementById('type').value || '';
      const statut = document.getElementById('statut').value || '';
      const date = document.getElementById('date').value || '';
      const heure = document.getElementById('heure').value || '';
      const nom = document.getElementById('nom').value || '';
      const prenom = document.getElementById('prenom').value || '';
      const contact = document.getElementById('contact').value || '';
      const source = document.getElementById('source').value || '';
      const technicien = document.getElementById('technicien').value || '';
      const adresse = document.getElementById('adresse').value || '';
      const spOk = document.getElementById('spOk').checked ? 'Oui' : 'Non';
      const numCarte = document.getElementById('numCarte').value || '';
      const numDecodeur = document.getElementById('numDecodeur').value || '';
      const bouquet = document.getElementById('bouquet').value || '';
      const montant = document.getElementById('montant').value || '';
      const commSource = document.getElementById('commSource').textContent || '0';
      const commTech = document.getElementById('commTech').textContent || '0';
      const isVente = type === 'vente';

      const content = `
        <div class="ticket">
          <div class="center title">NOMENA SERVICE AMBATOLAMPY</div>
          <div class="center subtitle">CANAL+</div>
          <div class="center phone">0349360335</div>
          <div class="center small">Reçu d’opération</div>
          <div class="hr"></div>

          <div class="row"><div class="label">Type</div><div class="value">${type}</div></div>
          <div class="row"><div class="label">Statut</div><div class="value">${statut}</div></div>
          <div class="row"><div class="label">Date</div><div class="value">${date}</div></div>
          <div class="row"><div class="label">Heure</div><div class="value">${heure}</div></div>
          <div class="row"><div class="label">Nom</div><div class="value">${nom} ${prenom}</div></div>
          <div class="row"><div class="label">Contact</div><div class="value">${contact}</div></div>
          <div class="row"><div class="label">Adresse</div><div class="value">${adresse}</div></div>
          <div class="row"><div class="label">SP ok</div><div class="value">${spOk}</div></div>
          <div class="row"><div class="label">Carte</div><div class="value">${numCarte}</div></div>
          <div class="row"><div class="label">Décodeur</div><div class="value">${numDecodeur}</div></div>
          <div class="row"><div class="label">Bouquet</div><div class="value">${bouquet}</div></div>
          ${isVente ? '' : `<div class="row"><div class="label">Montant</div><div class="value">${montant} Ar</div></div>`}
          ${isVente ? '' : `<div class="row"><div class="label">Source</div><div class="value">${commSource} Ar</div></div>`}
          ${isVente ? '' : `<div class="row"><div class="label">Tech</div><div class="value">${commTech} Ar</div></div>`}

          <div class="hr"></div>
          <div class="center small">Merci pour votre confiance</div>
        </div>
      `;

      const w = window.open('', '_blank', 'width=420,height=700');
      w.document.write(`
        <html>
        <head>
          <meta charset="UTF-8">
          <title>Reçu</title>
          <style>
            @page { size: 80mm auto; margin: 0; }
            html, body { margin: 0; padding: 0; width: 100%; }
            body { font-family: Arial, sans-serif; color: #000; }
            .print-window {
              width: 72mm;
              padding: 2mm 3mm;
              font-size: 11px;
              color: #000;
            }
            .ticket { width: 100%; }
            .center { text-align: center; }
            .title { font-size: 14px; font-weight: 700; }
            .subtitle { font-size: 12px; font-weight: 700; margin-top: 1px; }
            .phone { font-size: 10px; margin-top: 1px; }
            .small { font-size: 10px; }
            .hr { border-top: 1px dashed #000; margin: 4px 0; }
            .row {
              display: flex;
              justify-content: space-between;
              gap: 4px;
              margin: 1px 0;
              align-items: flex-start;
            }
            .label {
              font-weight: 700;
              min-width: 24mm;
              flex: 0 0 24mm;
            }
            .value {
              flex: 1;
              text-align: right;
              word-break: break-word;
              overflow-wrap: anywhere;
            }
          </style>
        </head>
        <body>
          <div class="print-window">
            ${content}
          </div>
          <script>
            window.onload = function() {
              window.print();
              window.close();
            };
          <\/script>
        </body>
        </html>
      `);
      w.document.close();
    }

    document.getElementById('opForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const type = document.getElementById('type').value;
      const source = document.getElementById('source').value.trim();
      const technicien = document.getElementById('technicien').value.trim();
      const montantSaisi = document.getElementById('montant').value;

      let commissions;
      if (type === 'vente') {
        commissions = calcSaleCommission(source, technicien);
      } else {
        commissions = calcReaboCommission(source, montantSaisi);
      }

      const photos = type === 'vente' ? await getPhotoValues() : {
        photoDecodeur: '',
        photoCarte: '',
        photoSignal: '',
        photoParabole: ''
      };

      const operation = {
        id: editId || generateId(),
        type: type,
        statut: document.getElementById('statut').value,
        date: document.getElementById('date').value,
        heure: document.getElementById('heure').value,
        nom: document.getElementById('nom').value.trim(),
        prenom: document.getElementById('prenom').value.trim(),
        contact: document.getElementById('contact').value.trim(),
        source: source,
        technicien: type === 'vente' ? technicien : '',
        adresse: document.getElementById('adresse').value.trim(),
        spOk: document.getElementById('spOk').checked,
        numCarte: document.getElementById('numCarte').value.trim(),
        numDecodeur: document.getElementById('numDecodeur').value.trim(),
        bouquet: type === 'reabo' ? document.getElementById('bouquet').value.trim() : '',
        montant: commissions.montant,
        commissionToi: commissions.commissionToi,
        commissionSource: commissions.commissionSource,
        commissionTech: commissions.commissionTech,
        photoDecodeur: photos.photoDecodeur,
        photoCarte: photos.photoCarte,
        photoSignal: photos.photoSignal,
        photoParabole: photos.photoParabole
      };

      const data = loadData();
      if (editId) {
        const index = data.findIndex(x => x.id === editId);
        if (index >= 0) data[index] = operation;
      } else {
        data.push(operation);
      }

      saveData(data);
      alert(editId ? '✅ Modifié !' : '✅ Enregistré !');
      
      if (!editId) {
        resetForm();
      } else {
        window.history.replaceState({}, '', window.location.pathname);
        editId = null;
        document.getElementById('formTitle').textContent = '➕ Nouvelle opération';
      }
    });

    document.getElementById('source').addEventListener('input', renderCalc);
    document.getElementById('technicien').addEventListener('input', renderCalc);
    document.getElementById('montant').addEventListener('input', renderCalc);

    document.addEventListener('DOMContentLoaded', () => {
      setDefaultDateTime();
      loadEditIfAny();
      renderVisibility();
      renderCalc();
    });
  </script>
</body>
</html>
