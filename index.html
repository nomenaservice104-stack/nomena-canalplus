<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CANAL+ - Saisie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',sans-serif;background:#eef2f7;color:#e9eef5;line-height:1.5;min-height:100vh}
    .header{background:#16202d;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.12)}
    .header h1{font-size:18px;color:#eaf1fb;font-weight:700}
    .nav-btn{background:#2f6fed;color:#fff;border:none;padding:7px 13px;border-radius:6px;cursor:pointer;font-weight:600;font-size:12px;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
    .nav-btn:hover{opacity:.9}
    .nav-links{display:flex;gap:6px}
    .container{max-width:620px;margin:16px auto;padding:0 12px}
    .card{background:#16202d;border-radius:8px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.12);color:#eef4fb}
    .card h2{font-size:15px;margin-bottom:12px;color:#f2f6fb;font-weight:600}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
    .form-group{margin-bottom:0}
    .form-group label{display:block;font-size:11px;color:#b8c4d4;margin-bottom:3px;font-weight:500}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:6px 8px;border:1px solid #415063;border-radius:5px;background:#1a2431;color:#eef4fb;font-size:12px;font-family:inherit}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#2f6fed}
    .form-group textarea{resize:vertical;min-height:60px}
    .full-width{grid-column:1/-1}
    .contact-group{max-width:190px}
    .checkbox-group{display:flex;align-items:center;gap:8px;padding-top:18px}
    .checkbox-group label{margin:0;font-size:12px;color:#b8c4d4}
    .checkbox-group input{width:auto;accent-color:#2f6fed}
    .btn-group{display:flex;gap:7px;margin-top:12px}
    button{border:none;padding:7px 13px;border-radius:5px;cursor:pointer;font-weight:600;font-size:12px}
    .btn-primary{background:#2f6fed;color:#fff;flex:1}
    .btn-secondary{background:#415063;color:#eef4fb;flex:1}
    .btn-danger{background:#dc3545;color:#fff}
    button:hover{opacity:.92}
    .hidden{display:none !important}
    .info-box{background:#1a2431;border-radius:5px;padding:8px;margin-top:10px;font-size:10px;color:#94a3b8}
    .info-box strong{color:#b8c4d4}
    .commission-display{background:#1a2431;border-radius:5px;padding:8px;margin-top:8px;font-size:11px}
    .commission-display div{margin:3px 0}
    .commission-toi{color:#22c55e;font-weight:700}
    .commission-source{color:#38bdf8;font-weight:600}
    .commission-tech{color:#f59e0b;font-weight:600}
    
    /* IMPRESSION 8cm */
    #printArea {
      display: none;
      width: 8cm;
      font-family: monospace;
      font-size: 11px;
      color: black;
      background: white;
      padding: 5mm;
      line-height: 1.3;
    }
    
    @media print {
      body { background: white; margin: 0; padding: 0; }
      .header, .container, .nav-links { display: none !important; }
      #printArea { display: block !important; position: absolute; top: 0; left: 0; width: 8cm !important; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📺 CANAL+ - Saisie</h1>
    <div class="nav-links">
      <a href="acceuil.html" class="nav-btn">🏠 Acceuil</a>
      <a href="commissions.html" class="nav-btn">💰 Commissions</a>
      <a href="stock.html" class="nav-btn">📦 Stock</a>
      <a href="liste.html" class="nav-btn">📋 Liste</a>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <h2 id="formTitle">➕ Nouvelle opération</h2>
      
      <form id="opForm">
        <div class="form-grid">
          <div class="form-group">
            <label>Type *</label>
            <select id="type" required onchange="renderVisibility();renderCalc()">
              <option value="vente">Vente</option>
              <option value="reabo">Réabonnement</option>
            </select>
          </div>
          
          <div class="form-group">
            <label>Statut</label>
            <select id="statut">
              <option value="OK">OK</option>
              <option value="En attente">En attente</option>
              <option value="Annulé">Annulé</option>
            </select>
          </div>
          
          <div class="form-group">
            <label>Date *</label>
            <input type="date" id="date" required>
          </div>
          
          <div class="form-group">
            <label>Heure *</label>
            <input type="time" id="heure" required>
          </div>
          
          <div class="form-group">
            <label>Nom *</label>
            <input type="text" id="nom" placeholder="Nom" required>
          </div>
          
          <div class="form-group">
            <label>Prénom</label>
            <input type="text" id="prenom" placeholder="Prénom">
          </div>
          
          <div class="form-group contact-group">
            <label>Contact</label>
            <input type="text" id="contact" placeholder="15 chiffres" maxlength="15" inputmode="numeric">
          </div>
          
          <div class="form-group">
            <label>Source</label>
            <input type="text" id="source" placeholder="Ex: Facebook, Voisin...">
          </div>
          
          <div class="form-group">
            <label>Technicien</label>
            <input type="text" id="technicien" placeholder="Nom du tech">
          </div>
          
          <div class="form-group">
            <label>Adresse</label>
            <input type="text" id="adresse" placeholder="Adresse">
          </div>
          
          <div class="form-group checkbox-group">
            <input type="checkbox" id="spOk">
            <label for="spOk">SP ok</label>
          </div>
          
          <div class="form-group" id="carteGroup">
            <label>N° Carte *</label>
            <input type="text" id="numCarte" placeholder="Numéro carte">
          </div>
          
          <div class="form-group" id="decodeurGroup">
            <label>N° Décodeur</label>
            <input type="text" id="numDecodeur" placeholder="Numéro décodeur">
          </div>
          
          <div class="form-group" id="bouquetGroup">
            <label>Bouquet *</label>
            <select id="bouquet" required>
              <option value="">Choisir bouquet...</option>
              <option value="Access">Access</option>
              <option value="Evasion">Evasion</option>
              <option value="Access+">Access+</option>
              <option value="Tout Canal">Tout Canal</option>
              <option value="Non précisé">Non précisé</option>
            </select>
          </div>
          
          <div class="form-group" id="montantGroup">
            <label>Montant (Ar) *</label>
            <input type="number" id="montant" placeholder="0" min="0" required>
          </div>

          <div class="form-group full-width hidden" id="photosGroup">
            <label>Photos vente</label>
            <div class="form-grid">
              <div class="form-group">
                <label>Photo décodeur</label>
                <input type="file" id="photoDecodeur" accept="image/*">
              </div>
              <div class="form-group">
                <label>Photo carte</label>
                <input type="file" id="photoCarte" accept="image/*">
              </div>
              <div class="form-group">
                <label>Photo signal</label>
                <input type="file" id="photoSignal" accept="image/*">
              </div>
              <div class="form-group">
                <label>Photo parabole</label>
                <input type="file" id="photoParabole" accept="image/*">
              </div>
            </div>
          </div>
        </div>

        <div class="commission-display" id="commissionBox">
          <div><strong>ℹ️ Commissions :</strong></div>
          <div class="commission-toi">👉 Ta commission : <span id="commToi">0</span> Ar</div>
          <div class="commission-source">📢 Source : <span id="commSource">0</span> Ar</div>
          <div class="commission-tech">🔧 Tech : <span id="commTech">0</span> Ar</div>
        </div>

        <div class="info-box">
          <strong>Vente :</strong> 25k fixe (Source:5k, Tech:10k, Toi:10k)<br>
          <strong>Réabo :</strong> 6% (sans source) ou 3%+3% (avec source)
        </div>

        <div class="btn-group">
          <button type="button" class="btn-secondary" onclick="resetForm()">🔄 Effacer</button>
          <button type="button" class="btn-secondary" onclick="printBeforeSave()">🖨️ Imprimer</button>
          <button type="submit" class="btn-primary">💾 Enregistrer</button>
        </div>
      </form>
    </div>
  </div>

  <div id="printArea"></div>

  <script>
    const STORAGE_KEY = 'canalplus_operations';
    let editId = null;

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2);
    }

    function loadData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch (e) {
        return [];
      }
    }

    function saveData(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    function setDefaultDateTime() {
      const now = new Date();
      document.getElementById('date').value = now.toISOString().split('T')[0];
      document.getElementById('heure').value = now.toTimeString().split(' ')[0].substring(0,5);
    }

    function renderVisibility() {
      const type = document.getElementById('type').value;
      document.getElementById('carteGroup').classList.remove('hidden');
      
      if (type === 'vente') {
        document.getElementById('decodeurGroup').classList.remove('hidden');
        document.getElementById('bouquetGroup').classList.add('hidden');
        document.getElementById('montantGroup').classList.add('hidden');
        document.getElementById('photosGroup').classList.remove('hidden');
        document.getElementById('bouquet').required = false;
        document.getElementById('montant').required = false;
      } else {
        document.getElementById('decodeurGroup').classList.add('hidden');
        document.getElementById('bouquetGroup').classList.remove('hidden');
        document.getElementById('montantGroup').classList.remove('hidden');
        document.getElementById('photosGroup').classList.add('hidden');
        document.getElementById('bouquet').required = true;
        document.getElementById('montant').required = true;
      }
    }

    function calcSaleCommission(source, technicien) {
      const base = 25000;
      const commissionSource = source ? 5000 : 0;
      const commissionTech = technicien ? 10000 : 0;
      const commissionToi = base - commissionSource - commissionTech;
      return { commissionToi, commissionSource, commissionTech, montant: base };
    }

    function calcReaboCommission(source, montant) {
      const base = Number(montant) || 0;
      if (source) {
        return { commissionToi: base * 0.03, commissionSource: base * 0.03, commissionTech: 0, montant: base };
      } else {
        return { commissionToi: base * 0.06, commissionSource: 0, commissionTech: 0, montant: base };
      }
    }

    function renderCalc() {
      const type = document.getElementById('type').value;
      const source = document.getElementById('source').value.trim();
      const technicien = document.getElementById('technicien').value.trim();
      const montantSaisi = document.getElementById('montant').value;

      let commissions;
      if (type === 'vente') {
        commissions = calcSaleCommission(source, technicien);
        document.getElementById('montant').value = commissions.montant;
      } else {
        commissions = calcReaboCommission(source, montantSaisi);
      }

      document.getElementById('commToi').textContent = Math.round(commissions.commissionToi).toLocaleString('fr-FR');
      document.getElementById('commSource').textContent = Math.round(commissions.commissionSource).toLocaleString('fr-FR');
      document.getElementById('commTech').textContent = Math.round(commissions.commissionTech).toLocaleString('fr-FR');
    }

    function resetForm() {
      document.getElementById('opForm').reset();
      editId = null;
      setDefaultDateTime();
      document.getElementById('formTitle').textContent = '➕ Nouvelle opération';
      renderVisibility();
      renderCalc();
    }

    function printBeforeSave() {
      if (!document.getElementById('opForm').checkValidity()) {
        document.getElementById('opForm').reportValidity();
        return;
      }

      const type = document.getElementById('type').value;
      const source = document.getElementById('source').value.trim();
      const technicien = document.getElementById('technicien').value.trim();
      const montantSaisi = document.getElementById('montant').value;

      let commissions = type === 'vente' 
        ? calcSaleCommission(source, technicien)
        : calcReaboCommission(source, montantSaisi);

      const printText = `
NOMENA SERVICE AMBATOLAMPY
        CANAL+

034 93 603 35
WhatsApp

--------------------------------

Type : ${type === 'vente' ? 'VENTE' : 'REABO'}
Statut : OK
Date : ${document.getElementById('date').value}
Heure : ${document.getElementById('heure').value}

Nom : ${document.getElementById('nom').value}
Prénom : ${document.getElementById('prenom').value}
Contact : ${document.getElementById('contact').value}
Adresse : ${document.getElementById('adresse').value}
Carte : ${document.getElementById('numCarte').value}
Decodeur : ${document.getElementById('numDecodeur').value}
Bouquet : ${document.getElementById('bouquet').value}
${type === 'reabo' ? 'Montant : ' + commissions.montant + ' Ar' : ''}

--------------------------------

Votre satisfaction
notre priorité
`.trim();

      document.getElementById('printArea').textContent = printText;
      window.print();
    }

    document.getElementById('opForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const type = document.getElementById('type').value;
      const source = document.getElementById('source').value.trim();
      const technicien = document.getElementById('technicien').value.trim();
      const montantSaisi = document.getElementById('montant').value;

      let commissions = type === 'vente' 
        ? calcSaleCommission(source, technicien)
        : calcReaboCommission(source, montantSaisi);

      const operation = {
        id: editId || generateId(),
        type,
        statut: document.getElementById('statut').value,
        date: document.getElementById('date').value,
        heure: document.getElementById('heure').value,
        nom: document.getElementById('nom').value.trim(),
        prenom: document.getElementById('prenom').value.trim(),
        contact: document.getElementById('contact').value.trim(),
        source,
        technicien: type === 'vente' ? technicien : '',
        adresse: document.getElementById('adresse').value.trim(),
        spOk: document.getElementById('spOk').checked,
        numCarte: document.getElementById('numCarte').value.trim(),
        numDecodeur: document.getElementById('numDecodeur').value.trim(),
        bouquet: type === 'reabo' ? document.getElementById('bouquet').value.trim() : '',
        montant: commissions.montant,
        commissionToi: commissions.commissionToi,
        commissionSource: commissions.commissionSource,
        commissionTech: commissions.commissionTech
      };

      const data = loadData();
      if (editId) {
        const index = data.findIndex(x => x.id === editId);
        if (index >= 0) data[index] = operation;
      } else {
        data.push(operation);
      }

      saveData(data);
      alert(editId ? 'Modifie !' : 'Enregistre !');
      
      if (!editId) resetForm();
      else {
        window.history.replaceState({}, '', window.location.pathname);
        editId = null;
        document.getElementById('formTitle').textContent = '➕ Nouvelle opération';
      }
    });

    ['source','technicien','montant'].forEach(id => 
      document.getElementById(id).addEventListener('input', renderCalc)
    );

    document.addEventListener('DOMContentLoaded', () => {
      setDefaultDateTime();
      renderVisibility();
      renderCalc();
    });
  </script>
</body>
</html>
